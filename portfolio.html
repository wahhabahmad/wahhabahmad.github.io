<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Wahab Ahmad - Portfolio</title>
    <link rel="icon" type="image/png" href="assets/logo.png"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#FF6B6B",
                        "primary-hover": "#EE5253",
                        secondary: "#4ECDC4",
                        "secondary-hover": "#45B7AF",
                        tertiary: "#FFE66D",
                        "purple-accent": "#9c88ff",
                        "purple-hover": "#8c7ae6",
                        "grey-accent": "#6B7280",
                        "grey-hover": "#4B5563",
                        "green-accent": "#10B981",
                        "green-hover": "#059669",
                        "background-main": "#FFF9E6",
                        surface: "#ffffff",
                        "text-main": "#2D3436",
                        "text-heading": "#2D3436",
                        "background-light": "#FFFAF0",
                        "background-dark": "#2D3436",
                        accent: "#FF9F43"
                    },
                    fontFamily: {
                        display: ["Fredoka", "sans-serif"],
                        body: ["Nunito", "sans-serif"]
                    },
                    borderRadius: {
                        DEFAULT: "1.5rem",
                        lg: "2.5rem",
                        xl: "3.5rem",
                        full: "9999px"
                    },
                    boxShadow: {
                        "game-btn": "0 6px 0 0 #D63031",
                        "game-btn-hover": "0 3px 0 0 #D63031",
                        "game-btn-secondary": "0 6px 0 0 #1ABC9C",
                        "game-btn-secondary-hover": "0 3px 0 0 #1ABC9C",
                        "game-btn-purple": "0 6px 0 0 #8c7ae6",
                        "game-btn-purple-hover": "0 3px 0 0 #8c7ae6",
                        "game-btn-grey": "0 6px 0 0 #4B5563",
                        "game-btn-grey-hover": "0 3px 0 0 #4B5563",
                        "game-btn-green": "0 6px 0 0 #059669",
                        "game-btn-green-hover": "0 3px 0 0 #059669",
                        "game-card": "0 10px 0 0 rgba(0,0,0,0.05), 0 20px 25px -5px rgba(0,0,0,0.1)",
                        "panel": "0 8px 0 0 #FFEAA7",
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-background-main text-text-main font-body overflow-x-hidden antialiased selection:bg-secondary selection:text-white">
<div class="relative flex min-h-screen w-full flex-col">
    <!-- Navbar will be injected here -->
    <div id="navbar-container"></div>
    
    <main class="flex-grow pt-32 pb-20">
        <div class="py-24 bg-white relative">
            <div class="absolute top-20 left-10 opacity-10 transform rotate-12">
                <span class="material-symbols-outlined text-9xl text-primary">extension</span>
            </div>
            <div class="absolute bottom-40 right-10 opacity-10 transform -rotate-12">
                <span class="material-symbols-outlined text-9xl text-secondary">joystick</span>
            </div>
            <div class="px-4 md:px-10 lg:px-40 layout-container max-w-[1200px] mx-auto relative z-10">
                <div class="flex flex-col md:flex-row items-end justify-between mb-16 gap-8">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="size-4 rounded-full bg-tertiary border-2 border-orange-300"></span>
                            <span class="text-orange-400 font-black uppercase text-sm tracking-wider">Level Select</span>
                        </div>
                        <h2 class="font-display text-5xl md:text-6xl font-black text-text-heading">
                            My <span class="text-secondary underline decoration-wavy decoration-4 underline-offset-4">Quests</span>
                        </h2>
                    </div>
                    <div class="flex flex-wrap gap-2 bg-background-light p-2 rounded-2xl border-2 border-slate-100">
                        <button class="px-6 py-3 rounded-xl bg-primary text-white font-black text-sm shadow-game-btn hover:translate-y-1 hover:shadow-none transition-all portfolio-filter-btn active" onclick="filterPortfolio('all', this)">All</button>
                        <button class="px-6 py-3 rounded-xl bg-white text-slate-500 font-bold text-sm border-b-4 border-slate-200 hover:bg-slate-50 hover:text-primary transition-all portfolio-filter-btn" onclick="filterPortfolio('games', this)">Games</button>
                        <button class="px-6 py-3 rounded-xl bg-white text-slate-500 font-bold text-sm border-b-4 border-slate-200 hover:bg-slate-50 hover:text-primary transition-all portfolio-filter-btn" onclick="filterPortfolio('ui', this)">UI/UX</button>
                        <button class="px-6 py-3 rounded-xl bg-white text-slate-500 font-bold text-sm border-b-4 border-slate-200 hover:bg-slate-50 hover:text-primary transition-all portfolio-filter-btn" onclick="filterPortfolio('3d', this)">3D Art</button>
                    </div>
                </div>
                <!-- Portfolio grid will be loaded from JSON -->
                <div id="portfolio-grid"></div>
            </div>
        </div>
    </main>
    
    <!-- Footer will be injected here -->
    <div id="footer-container"></div>
</div>

<script src="js/components.js"></script>
<script src="js/portfolio.js"></script>
<script src="js/script.js"></script>
<script>
    // Initialize components
    initComponents('portfolio');
</script>
</body>
</html>
